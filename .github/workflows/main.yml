name: Build Ultra Micro APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Specific NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Build APK
        run: |
          # Langsung tembak ke folder hasil install sdkmanager
          export NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125
          export PATH=$NDK_HOME:$PATH
          
          echo "Using NDK at: $NDK_HOME"
          
          # Buat keystore debug
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          # Jalankan build dengan path eksplisit
          make build NDK_PATH=$NDK_HOME
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Native-C-APK
          path: "*.apk"
