name: Build Ultra Micro APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # --- BAGIAN CACHE MULAI DI SINI ---
      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk/26.1.10909125
          key: ${{ runner.os }}-ndk-26.1.10909125
      
      - name: Install NDK (Only if not cached)
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: sdkmanager "ndk;26.1.10909125"
      # --- BAGIAN CACHE SELESAI ---

      - name: Build APK
        run: |
          export NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125
          export PATH=$NDK_HOME:$PATH
          
          # Buat keystore debug
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          make build NDK_PATH=$NDK_HOME
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Native-C-APK
          path: "*.apk"
